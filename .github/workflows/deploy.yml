name: CI & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos necesarios para publicar en GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo despliegue a la vez; cancela los anteriores en curso.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify cube engine (motor ⇄ cubejs)
        run: pnpm verify:cube

      - name: Build
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
